<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <style>
      text { font-family: 'Helvetica Neue', Arial, sans-serif; fill: #e2e8f0; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#0f1117"/>

  <!-- Plot area: x=80..740, y=50..430 -->
  <!-- Gridlines vertical -->
  <line x1="190" y1="50" x2="190" y2="430" stroke="#1e2330" stroke-width="1"/>
  <line x1="300" y1="50" x2="300" y2="430" stroke="#1e2330" stroke-width="1"/>
  <line x1="410" y1="50" x2="410" y2="430" stroke="#1e2330" stroke-width="1"/>
  <line x1="520" y1="50" x2="520" y2="430" stroke="#1e2330" stroke-width="1"/>
  <line x1="630" y1="50" x2="630" y2="430" stroke="#1e2330" stroke-width="1"/>

  <!-- Gridlines horizontal -->
  <line x1="80" y1="106" x2="740" y2="106" stroke="#1e2330" stroke-width="1"/>
  <line x1="80" y1="163" x2="740" y2="163" stroke="#1e2330" stroke-width="1"/>
  <line x1="80" y1="220" x2="740" y2="220" stroke="#1e2330" stroke-width="1"/>
  <line x1="80" y1="277" x2="740" y2="277" stroke="#1e2330" stroke-width="1"/>
  <line x1="80" y1="334" x2="740" y2="334" stroke="#1e2330" stroke-width="1"/>
  <line x1="80" y1="392" x2="740" y2="392" stroke="#1e2330" stroke-width="1"/>

  <!-- Zone backgrounds (semi-transparent) -->
  <!-- Zone 1: x=80 to VT1 at x=340 -->
  <rect x="80" y="50" width="260" height="380" fill="#22c55e" opacity="0.08"/>
  <!-- Zone 2: VT1 x=340 to VT2 x=570 -->
  <rect x="340" y="50" width="230" height="380" fill="#eab308" opacity="0.08"/>
  <!-- Zone 3: VT2 x=570 to x=740 -->
  <rect x="570" y="50" width="170" height="380" fill="#ef4444" opacity="0.08"/>

  <!-- Zone labels -->
  <text x="210" y="420" font-size="13" fill="#22c55e" text-anchor="middle" font-weight="600">Zone 1 — Aerobic</text>
  <text x="455" y="420" font-size="13" fill="#eab308" text-anchor="middle" font-weight="600">Zone 2 — Threshold</text>
  <text x="655" y="420" font-size="13" fill="#ef4444" text-anchor="middle" font-weight="600">Zone 3 — Anaerobic</text>

  <!-- VT1 vertical dashed line at x=340 -->
  <line x1="340" y1="50" x2="340" y2="400" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="8,5" opacity="0.7"/>
  <text x="340" y="72" font-size="11" fill="#e2e8f0" text-anchor="middle" opacity="0.9">Aerobic Threshold (VT1)</text>

  <!-- VT2 vertical dashed line at x=570 -->
  <line x1="570" y1="50" x2="570" y2="400" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="8,5" opacity="0.7"/>
  <text x="570" y="72" font-size="11" fill="#e2e8f0" text-anchor="middle" opacity="0.9">Anaerobic Threshold (VT2)</text>

  <!-- Axes -->
  <!-- X axis -->
  <line x1="80" y1="430" x2="740" y2="430" stroke="#e2e8f0" stroke-width="1.5"/>
  <!-- X axis arrow -->
  <polygon points="740,430 730,425 730,435" fill="#e2e8f0"/>
  <text x="410" y="468" font-size="13" fill="#e2e8f0" text-anchor="middle">Exercise Intensity</text>

  <!-- Y axis left -->
  <line x1="80" y1="430" x2="80" y2="50" stroke="#e2e8f0" stroke-width="1.5"/>
  <polygon points="80,50 75,60 85,60" fill="#e2e8f0"/>
  <text x="40" y="240" font-size="13" fill="#60a5fa" text-anchor="middle" transform="rotate(-90,40,240)">Heart Rate (bpm)</text>

  <!-- Y axis left tick labels (HR: 90 to 190) -->
  <text x="72" y="404" font-size="10" fill="#60a5fa" text-anchor="end">90</text>
  <text x="72" y="334" font-size="10" fill="#60a5fa" text-anchor="end">110</text>
  <text x="72" y="264" font-size="10" fill="#60a5fa" text-anchor="end">130</text>
  <text x="72" y="194" font-size="10" fill="#60a5fa" text-anchor="end">150</text>
  <text x="72" y="124" font-size="10" fill="#60a5fa" text-anchor="end">170</text>
  <text x="72" y="58" font-size="10" fill="#60a5fa" text-anchor="end">190</text>

  <!-- Y axis right -->
  <line x1="740" y1="430" x2="740" y2="50" stroke="#e2e8f0" stroke-width="1.5"/>
  <polygon points="740,50 735,60 745,60" fill="#e2e8f0"/>
  <text x="775" y="240" font-size="13" fill="#fb923c" text-anchor="middle" transform="rotate(90,775,240)">Ventilation (L/min)</text>

  <!-- Y axis right tick labels (Ventilation: 20 to 160) -->
  <text x="748" y="404" font-size="10" fill="#fb923c" text-anchor="start">20</text>
  <text x="748" y="334" font-size="10" fill="#fb923c" text-anchor="start">48</text>
  <text x="748" y="264" font-size="10" fill="#fb923c" text-anchor="start">76</text>
  <text x="748" y="194" font-size="10" fill="#fb923c" text-anchor="start">104</text>
  <text x="748" y="124" font-size="10" fill="#fb923c" text-anchor="start">132</text>
  <text x="748" y="58" font-size="10" fill="#fb923c" text-anchor="start">160</text>

  <!-- HR curve (blue, smooth rise from ~90 at x=80 to ~190 at x=740) -->
  <!-- Maps: HR 90=y400, HR 190=y54; x=80..740 -->
  <path d="M 80,400 C 200,385 300,340 340,300 C 400,240 480,175 570,120 C 630,85 700,62 740,54"
        fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Ventilation curve (orange, slow rise then two breakpoints) -->
  <!-- Slow rise zone 1, first breakpoint at VT1, steeper zone 2, second breakpoint at VT2, very steep zone 3 -->
  <path d="M 80,390 C 140,385 220,375 280,360 Q 310,348 340,320
           C 380,275 430,235 500,195 Q 535,170 570,135
           C 610,85 660,60 740,40"
        fill="none" stroke="#fb923c" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Legend box -->
  <rect x="90" y="82" width="170" height="58" rx="4" fill="#0f1117" stroke="#2d3748" stroke-width="1" opacity="0.9"/>
  <line x1="100" y1="102" x2="130" y2="102" stroke="#60a5fa" stroke-width="2.5"/>
  <text x="138" y="106" font-size="12" fill="#e2e8f0">Heart Rate</text>
  <line x1="100" y1="126" x2="130" y2="126" stroke="#fb923c" stroke-width="2.5"/>
  <text x="138" y="130" font-size="12" fill="#e2e8f0">Ventilation</text>

  <!-- Title -->
  <text x="400" y="30" font-size="18" fill="#e2e8f0" text-anchor="middle" font-weight="700">Three-Zone Intensity Model</text>
</svg>